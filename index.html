<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>GreenShop</title>
  
  <!-- Подключение сброса и основных стилей -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 1. ХЕДЕР (ЗАГОЛОВОК САЙТА) -->
  <header class="header">
    <div class="container header-container">
      
      <!-- Логотип -->
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="GREENSHOP Logo" class="logo-img">
      </a>

      <!-- Навигация -->
      <nav class="nav">
        <ul class="nav-list">
          <li class="nav-item"><a href="index.html" class="nav-link active">Home</a></li>
          <li class="nav-item"><a href="#" class="nav-link">Shop</a></li>
          <li class="nav-item"><a href="#" class="nav-link">Plant Care</a></li>
          <li class="nav-item"><a href="#" class="nav-link">Blogs</a></li>
        </ul>
      </nav>

      <!-- Действия (Кнопка входа) -->
      <div class="header-actions">
        <button class="btn btn-login">Login</button>
      </div>

    </div>
  </header>

  <main>
    <!-- 2. ПЕРВАЯ СЕКЦИЯ (HERO SECTION) -->
    <section class="hero">
      <div class="container hero-container">
        
        <!-- Левый блок с текстом -->
        <div class="hero-content">
          <span class="hero-subtitle">WELCOME TO GREENSHOP</span>
          <h1 class="hero-title">
            LET’S MAKE A <br>
            BETTER <span class="text-green">PLANET</span>
          </h1>
          <p class="hero-text">
            We are an online plant shop offering a wide range of cheap and trendy plants. Use our plants to create an unique Urban Jungle. Order your favorite plants!
          </p>
          <a href="#" class="btn btn-green">SHOP NOW</a>
        </div>

        <!-- Правый блок с картинкой растения -->
        <div class="hero-image-box">
          <img src="images/plant-big.png" alt="Big Plant" class="plant-img plant-big">
          <img src="images/plant-small.png" alt="Small Plant" class="plant-img plant-small">
        
      </div>
    </section>
  </main>

</body>
</html>
